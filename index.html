<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Meu Dinheiro 💰</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#15803d"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Meu Dinheiro"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#F0FDF4;font-family:system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;}
    #root{min-height:100vh;} ::-webkit-scrollbar{display:none;} select,input{font-family:inherit;}
    #splash{position:fixed;inset:0;background:#F0FDF4;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;transition:opacity .4s;}
    .spin{width:36px;height:36px;border:4px solid #D1FAE5;border-top-color:#15803d;border-radius:50%;animation:sp .8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="splash">
  <div style="font-size:56px">💰</div>
  <div class="spin"></div>
  <p style="color:#15803d;font-weight:800;font-size:17px">Meu Dinheiro</p>
</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm/dist/htm.umd.js"></script>
<script>
const {useState,useEffect,useCallback,useRef}=React;
const html=htm.bind(React.createElement);
const THIS_YEAR=new Date().getFullYear(); // 2026

(function(){try{
  const c=document.createElement('canvas');c.width=c.height=192;
  const x=c.getContext('2d'),r=44;
  x.beginPath();x.moveTo(r,0);x.lineTo(192-r,0);x.arcTo(192,0,192,r,r);
  x.lineTo(192,192-r);x.arcTo(192,192,192-r,192,r);x.lineTo(r,192);
  x.arcTo(0,192,0,192-r,r);x.lineTo(0,r);x.arcTo(0,0,r,0,r);
  x.fillStyle='#15803d';x.fill();
  x.fillStyle='white';x.font='bold 76px Arial';x.textAlign='center';x.textBaseline='middle';x.fillText('R$',96,96);
  const lnk=document.createElement('link');lnk.rel='apple-touch-icon';lnk.href=c.toDataURL('image/png');
  document.head.appendChild(lnk);
}catch(e){}})();

const hideSplash=()=>{const s=document.getElementById('splash');if(s){s.style.opacity='0';setTimeout(()=>s.remove(),400);}};

const MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const EXPENSE_CATS=["Alimentação","Moradia","Transporte","Saúde","Educação","Lazer","Cartão de Crédito","Financiamentos","Empréstimos","Outros"];
const INCOME_TYPES=["Salário","13º Salário","Hora Extra","Férias","FGTS/Rescisão","Pensão","Renda Extra","Freelance","Aluguel Recebido","Outros"];
const EMOJIS={"Alimentação":"🍽️","Moradia":"🏠","Transporte":"🚗","Saúde":"❤️","Educação":"📚","Lazer":"🎮","Cartão de Crédito":"💳","Financiamentos":"🏦","Empréstimos":"💸","Outros":"📦","Salário":"👔","13º Salário":"🎁","Hora Extra":"⏰","Férias":"🏖️","FGTS/Rescisão":"📋","Pensão":"👨‍👩‍👧","Renda Extra":"💡","Freelance":"💻","Aluguel Recebido":"🏘️"};
const CAT_COLORS={"Alimentação":"#F59E0B","Moradia":"#3B82F6","Transporte":"#8B5CF6","Saúde":"#EF4444","Educação":"#06B6D4","Lazer":"#10B981","Cartão de Crédito":"#F97316","Financiamentos":"#6366F1","Empréstimos":"#EC4899","Outros":"#9CA3AF"};
const TIPS=[
  {icon:"🌟",title:"Regra do 50-30-20",text:"Gaste no máximo 50% com necessidades, 30% com desejos e guarde pelo menos 20%."},
  {icon:"🚫",title:"Cuidado com o cartão",text:"Só gaste o que você já tem no bolso. Pague sempre o valor total da fatura."},
  {icon:"🏦",title:"Reserva de emergência",text:"Tente juntar pelo menos 3 meses dos seus gastos para imprevistos."},
  {icon:"🛒",title:"Liste antes de comprar",text:"Comprar sem lista aumenta os gastos em até 40%!"},
  {icon:"📱",title:"Compra por impulso",text:"Se quiser algo não planejado, espere 24h. A vontade geralmente passa."},
  {icon:"💸",title:"Evite juros caros",text:"Cheque especial e rotativo do cartão têm juros altíssimos. Fuja deles."},
  {icon:"📊",title:"Anote tudo",text:"R$10 por dia = R$300 por mês = R$3.600 por ano. Cada real conta!"},
  {icon:"🎯",title:"Tenha um objetivo",text:"Uma meta clara ajuda a resistir à tentação de gastar."},
  {icon:"🔄",title:"Revise todo mês",text:"15 minutos no fim do mês para revisar seus gastos fazem toda a diferença."},
];

const fmt=(v)=>(Number(v)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const KEY="meu-financeiro-v4";
const centsToNum=(c)=>parseInt(c||"0")/100;
const numToCents=(n)=>String(Math.round((Number(n)||0)*100));

// Migra dados antigos: adiciona ano usando a data do lançamento ou ano atual
const migrateData=(d)=>({
  ...d,
  transactions:(d.transactions||[]).map(t=>({
    ...t,
    year:t.year||(t.date?parseInt(t.date.split('-')[0]):THIS_YEAR)
  })),
  goals:d.goals||[],
});

const C={
  card:{background:"white",borderRadius:20,padding:20,marginBottom:16,boxShadow:"0 2px 10px rgba(0,0,0,0.07)"},
  inp:{border:"2px solid #E5E7EB",borderRadius:12,padding:"13px 15px",fontSize:16,width:"100%",boxSizing:"border-box",outline:"none",fontFamily:"inherit"},
  lbl:{fontSize:13,fontWeight:700,color:"#374151",marginBottom:6,display:"block"},
  btn:(bg,fg="#fff")=>({background:bg,color:fg,border:"none",borderRadius:14,padding:"16px 20px",fontWeight:800,fontSize:17,cursor:"pointer",display:"block",width:"100%",textAlign:"center",fontFamily:"inherit"}),
  row:(bg,fg="#fff")=>({background:bg,color:fg,border:"none",borderRadius:14,padding:"17px 0",fontWeight:800,fontSize:17,cursor:"pointer",flex:1,textAlign:"center",fontFamily:"inherit"}),
};

function Overlay({children,onClose}){
  return html`<div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:100,display:"flex",alignItems:"flex-end"}} onClick=${e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style=${{background:"white",borderRadius:"24px 24px 0 0",width:"100%",maxHeight:"90vh",overflowY:"auto",padding:"24px 24px 48px"}}>${children}</div>
  </div>`;
}

function CurrencyInput({value,onChange,style,large}){
  return html`<input type="text" inputMode="numeric"
    value=${(()=>{const c=parseInt(value||"0");if(!c)return"";return(c/100).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});})()}
    onChange=${e=>onChange(e.target.value.replace(/\D/g,""))}
    placeholder="R$ 0,00"
    style=${{...style,fontWeight:large?800:600,fontSize:large?22:16}}/>`;
}

function DonutChart({catTotals,total}){
  if(!total)return null;
  const cats=EXPENSE_CATS.filter(c=>catTotals[c]>0);
  if(!cats.length)return null;
  const R=58,CX=80,CY=80,CIRC=2*Math.PI*R;
  let off=CIRC/4;
  const segs=cats.map(c=>{const dash=(catTotals[c]/total)*CIRC;const s={c,color:CAT_COLORS[c],dash,offset:CIRC-off};off+=dash;return s;});
  return html`<div style=${{marginBottom:20}}>
    <svg viewBox="0 0 160 160" style=${{width:"100%",maxWidth:170,display:"block",margin:"0 auto"}}>
      ${segs.map(s=>html`<circle key=${s.c} cx=${CX} cy=${CY} r=${R} fill="none" stroke=${s.color} stroke-width="26" stroke-dasharray="${s.dash} ${CIRC}" stroke-dashoffset="${s.offset}"/>`)}
      <text x=${CX} y=${CY-5} text-anchor="middle" style=${{fontSize:"10px",fill:"#6B7280",fontFamily:"system-ui"}}>Total gastos</text>
      <text x=${CX} y=${CY+13} text-anchor="middle" style=${{fontSize:"12px",fontWeight:"bold",fill:"#111827",fontFamily:"system-ui"}}>${fmt(total)}</text>
    </svg>
    <div style=${{display:"flex",flexWrap:"wrap",gap:"6px 12px",marginTop:8,justifyContent:"center"}}>
      ${cats.map(c=>html`<div key=${c} style=${{display:"flex",alignItems:"center",gap:5,fontSize:12}}>
        <div style=${{width:10,height:10,borderRadius:3,background:CAT_COLORS[c],flexShrink:0}}></div>
        <span>${c} ${Math.round(catTotals[c]/total*100)}%</span>
      </div>`)}
    </div>
  </div>`;
}

function App(){
  const [tab,setTab]=useState("home");
  const [data,setData]=useState({userName:"",monthlyIncome:"",transactions:[],goals:[]});
  const [year,setYear]=useState(THIS_YEAR);
  const [month,setMonth]=useState(MONTHS[new Date().getMonth()]);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [editId,setEditId]=useState(null);
  const [delId,setDelId]=useState(null);
  const [calc,setCalc]=useState({total:"",saved:"",months:""});
  const firstRef=useRef(null);
  const importRef=useRef(null);

  useEffect(()=>{if(modal&&firstRef.current){const t=setTimeout(()=>firstRef.current?.focus(),60);return()=>clearTimeout(t);}},[modal]);

  useEffect(()=>{
    try{
      const raw=localStorage.getItem(KEY)||localStorage.getItem("meu-financeiro-v3");
      if(raw){const d=migrateData(JSON.parse(raw));setData(d);if(!d.userName)setModal("setup");}
      else setModal("setup");
    }catch{setModal("setup");}
    hideSplash();
  },[]);

  const persist=useCallback((d)=>{setData(d);try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}},[]);

  // Filtra sempre por mês E ano
  const monthTx=data.transactions.filter(t=>t.month===month&&t.year===year);
  const entradas=monthTx.filter(t=>t.type==="entrada").reduce((s,t)=>s+t.value,0);
  const gastos=monthTx.filter(t=>t.type==="gasto").reduce((s,t)=>s+t.value,0);
  const saldo=entradas-gastos;
  const income=Number(data.monthlyIncome)||0;
  const catTotals=Object.fromEntries(EXPENSE_CATS.map(c=>[c,monthTx.filter(t=>t.type==="gasto"&&t.category===c).reduce((s,t)=>s+t.value,0)]));

  // Histórico do ano selecionado
  const hist=MONTHS.map(m=>{
    const tx=data.transactions.filter(t=>t.month===m&&t.year===year);
    const e=tx.filter(t=>t.type==="entrada").reduce((s,t)=>s+t.value,0);
    const g=tx.filter(t=>t.type==="gasto").reduce((s,t)=>s+t.value,0);
    return{month:m,entradas:e,gastos:g,saldo:e-g,hasTx:tx.length>0};
  });
  const yearSaldo=hist.reduce((s,m)=>s+m.saldo,0);

  // Saldo acumulado de todos os anos (histórico real)
  const allTimeSaldo=data.transactions.reduce((s,t)=>s+(t.type==="entrada"?t.value:-t.value),0);

  // Anos com dados (para mostrar no seletor)
  const yearsWithData=[...new Set(data.transactions.map(t=>t.year||THIS_YEAR))].sort();
  const minYear=Math.min(THIS_YEAR-1,...yearsWithData);
  const maxYear=THIS_YEAR+1;

  const necessidades=["Alimentação","Moradia","Saúde","Transporte"].reduce((s,c)=>s+(catTotals[c]||0),0);
  const desejos=["Lazer","Educação","Outros"].reduce((s,c)=>s+(catTotals[c]||0),0);
  const dividas=["Cartão de Crédito","Financiamentos","Empréstimos"].reduce((s,c)=>s+(catTotals[c]||0),0);

  // Recorrentes
  const recurringAll=data.transactions.filter(t=>t.recurring);
  const recurringThisMonthYear=monthTx.filter(t=>t.recurring);
  const showRecurring=recurringAll.length>0&&recurringThisMonthYear.length===0;
  const addRecurring=()=>{
    const seen=new Set();
    const toAdd=recurringAll.filter(t=>{const k=`${t.description}|${t.category}|${t.type}`;if(seen.has(k))return false;seen.add(k);return true;})
      .map(t=>({...t,id:uid(),month,year,date:new Date().toISOString().split("T")[0]}));
    persist({...data,transactions:[...data.transactions,...toAdd]});
  };

  const exportData=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;
    a.download=`meu-dinheiro-backup-${THIS_YEAR}.json`;a.click();URL.revokeObjectURL(url);
  };
  const importData=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{try{const d=migrateData(JSON.parse(ev.target.result));if(d.transactions&&d.goals){persist(d);alert("✅ Dados importados com sucesso!");}}catch{alert("❌ Arquivo inválido!");}};
    reader.readAsText(file);e.target.value="";
  };

  const openAdd=(type)=>{setForm({type,date:new Date().toISOString().split("T")[0],description:"",category:type==="gasto"?EXPENSE_CATS[0]:INCOME_TYPES[0],value:"",recurring:false});setEditId(null);setModal("add");};
  const saveTransaction=()=>{
    const v=centsToNum(form.value);if(!v||!form.description?.trim())return;
    const tx={id:editId||uid(),month,year,type:form.type,date:form.date||"",description:form.description.trim(),category:form.category,value:v,recurring:!!form.recurring};
    persist({...data,transactions:editId?data.transactions.map(t=>t.id===editId?tx:t):[...data.transactions,tx]});setModal(null);
  };
  const deleteTx=(id)=>{persist({...data,transactions:data.transactions.filter(t=>t.id!==id)});setDelId(null);};

  const openGoal=(goal=null)=>{
    setForm(goal?{...goal,targetValue:numToCents(goal.targetValue),savedValue:numToCents(goal.savedValue)}:{dream:"",targetValue:"",savedValue:"",deadline:""});
    setEditId(goal?.id||null);setModal("goal");
  };
  const saveGoal=()=>{
    if(!form.dream?.trim()||!form.targetValue)return;
    const g={id:editId||uid(),dream:form.dream.trim(),targetValue:centsToNum(form.targetValue),savedValue:centsToNum(form.savedValue),deadline:form.deadline||""};
    persist({...data,goals:editId?data.goals.map(g2=>g2.id===editId?g:g2):[...data.goals,g]});setModal(null);setEditId(null);
  };
  const deleteGoal=(id)=>persist({...data,goals:data.goals.filter(g=>g.id!==id)});
  const saveSetup=()=>{if(!form.userName?.trim())return;persist({...data,userName:form.userName.trim(),monthlyIncome:centsToNum(form.monthlyIncome||"")});setModal(null);};

  const getStatus=()=>{
    if(!entradas&&!gastos)return{icon:"⚠️",text:"Registre seus lançamentos para ver o status",bg:"#FEF9C3",fg:"#713F12"};
    const p=entradas>0?gastos/entradas*100:100;
    if(p<70)return{icon:"🟢",text:"Você está no controle! Continue assim!",bg:"#D1FAE5",fg:"#065F46"};
    if(p<90)return{icon:"🟡",text:"Atenção! Seus gastos estão altos.",bg:"#FEF3C7",fg:"#92400E"};
    return{icon:"🔴",text:"Cuidado! Você gastou demais esse mês!",bg:"#FEE2E2",fg:"#991B1B"};
  };
  const calcPMes=calc.months&&calc.total?Math.max(0,(centsToNum(calc.total)-centsToNum(calc.saved))/Number(calc.months)):null;
  const sorted=[...monthTx].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const status=getStatus();

  // ── HEADER ──
  const Header=()=>html`<div style=${{background:"#15803d",color:"white",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 16px rgba(0,0,0,0.2)"}}>
    <div style=${{padding:"12px 20px 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style=${{fontWeight:800,fontSize:19,letterSpacing:"-0.5px"}}>💰 Meu Dinheiro</div>
        ${data.userName&&html`<div style=${{fontSize:12,opacity:0.85,marginTop:1}}>Olá, ${data.userName}! 👋</div>`}
      </div>
      <button onClick=${()=>{setForm({userName:data.userName,monthlyIncome:numToCents(data.monthlyIncome)});setModal("setup");}}
        style=${{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:10,padding:"8px 14px",color:"white",cursor:"pointer",fontWeight:700,fontSize:14,fontFamily:"inherit"}}>⚙️</button>
    </div>

    <!-- Seletor de ANO — sempre visível -->
    <div style=${{display:"flex",alignItems:"center",justifyContent:"center",gap:16,padding:"4px 20px"}}>
      <button onClick=${()=>setYear(y=>Math.max(minYear,y-1))} disabled=${year<=minYear}
        style=${{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,width:32,height:32,color:"white",cursor:year<=minYear?"default":"pointer",fontSize:18,opacity:year<=minYear?0.3:1,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
      <div style=${{fontWeight:800,fontSize:18,letterSpacing:1,minWidth:60,textAlign:"center"}}>${year}</div>
      <button onClick=${()=>setYear(y=>Math.min(maxYear,y+1))} disabled=${year>=maxYear}
        style=${{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,width:32,height:32,color:"white",cursor:year>=maxYear?"default":"pointer",fontSize:18,opacity:year>=maxYear?0.3:1,display:"flex",alignItems:"center",justifyContent:"center"}}>→</button>
    </div>

    <!-- Pills de MÊS (só em home e painel) -->
    ${(tab==="home"||tab==="painel")&&html`<div style=${{overflowX:"auto",padding:"6px 16px 0",display:"flex",gap:8}}>
      ${MONTHS.map(m=>html`<button key=${m} onClick=${()=>setMonth(m)} style=${{flexShrink:0,padding:"7px 13px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit",background:m===month?"white":"rgba(255,255,255,0.2)",color:m===month?"#15803d":"rgba(255,255,255,0.85)",boxShadow:m===month?"0 2px 8px rgba(0,0,0,0.15)":"none"}}>${m.slice(0,3)}</button>`)}
    </div>`}
    <div style=${{height:10}}/>
  </div>`;

  return html`<div style=${{fontFamily:"system-ui,-apple-system,sans-serif",background:"#F0FDF4",minHeight:"100vh",paddingBottom:90}}>
    <${Header}/>

    <div style=${{paddingTop:16}}>

      ${tab==="home"&&html`<div style=${{padding:"0 16px"}}>
        <div style=${{background:"linear-gradient(140deg,#16a34a,#15803d)",color:"white",borderRadius:24,padding:"20px 20px 18px",marginBottom:16,boxShadow:"0 6px 24px rgba(22,163,74,0.25)"}}>
          <div style=${{textAlign:"center",marginBottom:16}}>
            <div style=${{fontSize:11,opacity:0.8,fontWeight:700,letterSpacing:1.5}}>${month.toUpperCase()} DE ${year}</div>
            <div style=${{fontSize:46,fontWeight:900,letterSpacing:"-2px",marginTop:4}}>${fmt(saldo)}</div>
          </div>
          <div style=${{display:"flex",gap:12}}>
            ${[{l:"⬆️ ENTRADAS",v:entradas},{l:"⬇️ GASTOS",v:gastos}].map(({l,v})=>html`<div key=${l} style=${{flex:1,background:"rgba(255,255,255,0.15)",borderRadius:14,padding:"12px 10px",textAlign:"center"}}>
              <div style=${{fontSize:10,opacity:0.85,fontWeight:700,letterSpacing:0.8,marginBottom:3}}>${l}</div>
              <div style=${{fontSize:16,fontWeight:800}}>${fmt(v)}</div>
            </div>`)}
          </div>
        </div>

        ${showRecurring&&html`<div style=${{background:"#D1FAE5",borderRadius:16,padding:"14px 16px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
          <div>
            <div style=${{fontWeight:700,fontSize:14,color:"#065F46"}}>🔁 Lançamentos recorrentes</div>
            <div style=${{fontSize:12,color:"#047857",marginTop:2}}>${recurringAll.length} disponíveis para ${month}/${year}</div>
          </div>
          <button onClick=${addRecurring} style=${{background:"#15803d",color:"white",border:"none",borderRadius:12,padding:"10px 14px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>+ Adicionar</button>
        </div>`}

        <div style=${{display:"flex",gap:12,marginBottom:20}}>
          <button onClick=${()=>openAdd("entrada")} style=${C.row("#16a34a")}>➕ Entrada</button>
          <button onClick=${()=>openAdd("gasto")} style=${C.row("#DC2626")}>➖ Gasto</button>
        </div>

        <div style=${{...C.card,padding:0,overflow:"hidden"}}>
          <div style=${{padding:"16px 20px 12px",borderBottom:"1px solid #F3F4F6",fontWeight:700,fontSize:15,color:"#374151"}}>📋 ${month} ${year}</div>
          ${sorted.length===0
            ?html`<div style=${{padding:40,textAlign:"center",color:"#9CA3AF"}}><div style=${{fontSize:48,marginBottom:8}}>📝</div><div style=${{fontWeight:700}}>Nenhum lançamento ainda</div><div style=${{fontSize:13,marginTop:4}}>Use os botões acima para começar</div></div>`
            :sorted.map(tx=>html`<div key=${tx.id} style=${{display:"flex",alignItems:"center",padding:"13px 16px",borderBottom:"1px solid #F9FAFB",gap:12}}>
              <div style=${{width:44,height:44,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",background:tx.type==="entrada"?"#D1FAE5":"#FEE2E2",fontSize:22,flexShrink:0}}>${EMOJIS[tx.category]||(tx.type==="entrada"?"💵":"💸")}</div>
              <div style=${{flex:1,minWidth:0}}>
                <div style=${{fontWeight:700,fontSize:14,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${tx.recurring?html`<span style=${{fontSize:11,marginRight:4}}>🔁</span>`:""} ${tx.description}</div>
                <div style=${{fontSize:12,color:"#9CA3AF",marginTop:2}}>${tx.category} • ${tx.date}</div>
              </div>
              <div style=${{fontWeight:800,fontSize:15,color:tx.type==="entrada"?"#16a34a":"#DC2626",flexShrink:0,marginRight:6}}>${tx.type==="entrada"?"+":"-"}${fmt(tx.value)}</div>
              <button onClick=${()=>setDelId(tx.id)} style=${{background:"#FEE2E2",border:"none",borderRadius:8,padding:"6px 9px",cursor:"pointer",fontSize:14,flexShrink:0}}>🗑️</button>
            </div>`)
          }
        </div>
      </div>`}

      ${tab==="painel"&&html`<div style=${{padding:"0 16px"}}>
        <div style=${{...C.card,background:status.bg,color:status.fg,textAlign:"center",padding:"18px 16px"}}>
          <div style=${{fontSize:36}}>${status.icon}</div>
          <div style=${{fontWeight:700,marginTop:8,fontSize:15}}>${status.text}</div>
        </div>
        <div style=${C.card}>
          <div style=${{textAlign:"center",marginBottom:20}}>
            <div style=${{fontSize:11,color:"#6B7280",fontWeight:700,letterSpacing:1.2}}>SALDO — ${month.toUpperCase()} ${year}</div>
            <div style=${{fontSize:40,fontWeight:900,letterSpacing:"-2px",color:saldo>=0?"#16a34a":"#DC2626",marginTop:4}}>${fmt(saldo)}</div>
          </div>
          <div style=${{display:"flex",gap:12}}>
            ${[{l:"Recebido",v:entradas,c:"#16a34a",i:"⬆️"},{l:"Gasto",v:gastos,c:"#DC2626",i:"⬇️"}].map(({l,v,c,i})=>html`<div key=${l} style=${{flex:1,background:"#F9FAFB",borderRadius:14,padding:14,textAlign:"center"}}>
              <div style=${{fontSize:10,color:"#6B7280",fontWeight:700,letterSpacing:0.8,marginBottom:4}}>${i} ${l.toUpperCase()}</div>
              <div style=${{fontSize:18,fontWeight:800,color:c}}>${fmt(v)}</div>
              ${income>0&&html`<div style=${{fontSize:11,color:"#9CA3AF",marginTop:2}}>${Math.round(v/income*100)}% da renda</div>`}
            </div>`)}
          </div>
        </div>

        ${income>0&&html`<div style=${C.card}>
          <div style=${{fontWeight:700,fontSize:15,marginBottom:16,color:"#374151"}}>🧮 Regra 50-30-20</div>
          ${[{l:"🍽️ Necessidades",r:necessidades,p:0.5,d:"Moradia, Comida, Saúde, Transporte"},{l:"🎮 Desejos",r:desejos,p:0.3,d:"Lazer, Educação, Outros"},{l:"💳 Dívidas",r:dividas,p:0.2,d:"Cartão, Financiamento, Empréstimo"}].map(({l,r,p,d})=>{
            const meta=income*p,bar=Math.min(100,(r/Math.max(1,meta))*100),ok=r<=meta;
            return html`<div key=${l} style=${{marginBottom:18}}>
              <div style=${{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <div><div style=${{fontWeight:700,fontSize:13}}>${l}</div><div style=${{fontSize:11,color:"#9CA3AF"}}>${d}</div></div>
                <div style=${{textAlign:"right"}}><div style=${{fontWeight:700,fontSize:13,color:ok?"#16a34a":"#DC2626"}}>${fmt(r)}</div><div style=${{fontSize:11,color:"#9CA3AF"}}>meta: ${fmt(meta)}</div></div>
              </div>
              <div style=${{background:"#F3F4F6",borderRadius:8,height:12,overflow:"hidden"}}><div style=${{height:"100%",background:ok?"#16a34a":"#DC2626",width:bar+"%",borderRadius:8}}/></div>
            </div>`;
          })}
        </div>`}

        <div style=${C.card}>
          <div style=${{fontWeight:700,fontSize:15,marginBottom:14,color:"#374151"}}>📊 Gastos por Categoria</div>
          <${DonutChart} catTotals=${catTotals} total=${gastos}/>
          ${EXPENSE_CATS.filter(c=>catTotals[c]>0).length===0
            ?html`<div style=${{textAlign:"center",color:"#9CA3AF",padding:20}}>Nenhum gasto registrado neste mês.</div>`
            :EXPENSE_CATS.filter(c=>catTotals[c]>0).map(cat=>{
              const val=catTotals[cat],pct=Math.round(val/Math.max(1,gastos)*100);
              return html`<div key=${cat} style=${{marginBottom:14}}>
                <div style=${{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style=${{fontSize:14,fontWeight:600}}>${EMOJIS[cat]} ${cat}</span>
                  <span style=${{fontSize:13,fontWeight:700,color:"#DC2626"}}>${fmt(val)} <span style=${{color:"#9CA3AF",fontWeight:400}}>(${pct}%)</span></span>
                </div>
                <div style=${{background:"#FEE2E2",borderRadius:8,height:10,overflow:"hidden"}}><div style=${{height:"100%",background:CAT_COLORS[cat],width:pct+"%",borderRadius:8}}/></div>
              </div>`;
            })
          }
        </div>
      </div>`}

      ${tab==="historico"&&html`<div style=${{padding:"0 16px"}}>
        <!-- Resumo do ano -->
        <div style=${{background:"linear-gradient(140deg,#1d4ed8,#1e40af)",color:"white",borderRadius:24,padding:"20px",marginBottom:16,boxShadow:"0 4px 16px rgba(30,64,175,0.25)"}}>
          <div style=${{textAlign:"center",marginBottom:16}}>
            <div style=${{fontSize:11,opacity:0.8,fontWeight:700,letterSpacing:1.5}}>BALANÇO DE ${year}</div>
            <div style=${{fontSize:40,fontWeight:900,letterSpacing:"-2px",marginTop:4,color:yearSaldo>=0?"#bbf7d0":"#fecaca"}}>${fmt(yearSaldo)}</div>
          </div>
          <div style=${{display:"flex",gap:12}}>
            ${[
              {l:"⬆️ RECEITAS",v:hist.reduce((s,m)=>s+m.entradas,0)},
              {l:"⬇️ DESPESAS",v:hist.reduce((s,m)=>s+m.gastos,0)}
            ].map(({l,v})=>html`<div key=${l} style=${{flex:1,background:"rgba(255,255,255,0.15)",borderRadius:14,padding:"12px 10px",textAlign:"center"}}>
              <div style=${{fontSize:10,opacity:0.85,fontWeight:700,letterSpacing:0.8,marginBottom:3}}>${l}</div>
              <div style=${{fontSize:15,fontWeight:800}}>${fmt(v)}</div>
            </div>`)}
          </div>
        </div>

        <div style=${C.card}>
          <div style=${{fontWeight:700,fontSize:15,marginBottom:4,color:"#374151"}}>📅 Mês a mês — ${year}</div>
          <div style=${{fontSize:13,color:"#6B7280",marginBottom:16}}>Use as setas no topo para navegar entre anos</div>
          ${hist.map(({month:m,entradas:e,gastos:g,saldo:s,hasTx})=>html`<div key=${m} onClick=${()=>{setMonth(m);setTab("home");}} style=${{display:"flex",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #F3F4F6",opacity:hasTx?1:0.35,gap:8,cursor:"pointer"}}>
            <div style=${{width:56,fontWeight:700,fontSize:13,color:"#374151",flexShrink:0}}>${m.slice(0,3)}</div>
            <div style=${{flex:1,fontSize:12}}>
              ${hasTx?html`<div style=${{color:"#16a34a",fontWeight:600}}>⬆️ ${fmt(e)}</div><div style=${{color:"#DC2626",fontWeight:600}}>⬇️ ${fmt(g)}</div>`:html`<div style=${{color:"#9CA3AF"}}>Sem lançamentos</div>`}
            </div>
            ${hasTx&&html`<div style=${{fontWeight:800,fontSize:14,color:s>=0?"#16a34a":"#DC2626",flexShrink:0}}>${fmt(s)}</div>`}
            ${hasTx&&html`<div style=${{color:"#9CA3AF",fontSize:16}}>›</div>`}
          </div>`)}
        </div>

        <!-- Saldo geral (todos os anos) -->
        <div style=${{...C.card,background:"#F0FDF4",border:"2px solid #86efac"}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style=${{fontWeight:700,fontSize:14,color:"#15803d"}}>🏦 Saldo histórico total</div>
              <div style=${{fontSize:12,color:"#16a34a",marginTop:2}}>Todos os anos combinados</div>
            </div>
            <div style=${{fontWeight:900,fontSize:20,color:allTimeSaldo>=0?"#15803d":"#DC2626"}}>${fmt(allTimeSaldo)}</div>
          </div>
        </div>
      </div>`}

      ${tab==="metas"&&html`<div style=${{padding:"0 16px"}}>
        <button onClick=${()=>openGoal()} style=${{...C.btn("#D97706"),marginBottom:16}}>➕ Nova Meta</button>
        ${data.goals.length===0
          ?html`<div style=${{...C.card,textAlign:"center",padding:40,color:"#9CA3AF"}}><div style=${{fontSize:48}}>🎯</div><div style=${{fontWeight:700,marginTop:8}}>Nenhuma meta ainda</div><div style=${{fontSize:13,marginTop:4}}>Defina um sonho e acompanhe o progresso!</div></div>`
          :data.goals.map(goal=>{
            const pct=Math.min(100,(goal.savedValue/Math.max(1,goal.targetValue))*100);
            const falta=Math.max(0,goal.targetValue-goal.savedValue);
            return html`<div key=${goal.id} style=${C.card}>
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div style=${{flex:1}}><div style=${{fontWeight:800,fontSize:16,color:"#111827"}}>🌟 ${goal.dream}</div>${goal.deadline&&html`<div style=${{fontSize:12,color:"#9CA3AF",marginTop:2}}>📅 ${goal.deadline}</div>`}</div>
                <div style=${{display:"flex",gap:8}}>
                  <button onClick=${()=>openGoal(goal)} style=${{background:"#F3F4F6",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:14}}>✏️</button>
                  <button onClick=${()=>deleteGoal(goal.id)} style=${{background:"#FEE2E2",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:14}}>🗑️</button>
                </div>
              </div>
              <div style=${{background:"#FEF3C7",borderRadius:12,height:18,marginBottom:12,overflow:"hidden"}}><div style=${{height:"100%",background:"linear-gradient(90deg,#F59E0B,#D97706)",width:pct+"%",borderRadius:12}}/></div>
              <div style=${{display:"flex",justifyContent:"space-between",fontSize:13}}>
                <span style=${{color:"#6B7280"}}>Guardado: <b style=${{color:"#16a34a"}}>${fmt(goal.savedValue)}</b></span>
                <span><b style=${{color:falta>0?"#D97706":"#16a34a"}}>${Math.round(pct)}%</b>${falta>0&&html`<span style=${{color:"#9CA3AF"}}> • falta ${fmt(falta)}</span>`}</span>
              </div>
              <div style=${{textAlign:"right",fontSize:12,color:"#9CA3AF",marginTop:4}}>Meta: ${fmt(goal.targetValue)}</div>
            </div>`;
          })
        }
        <div style=${C.card}>
          <div style=${{fontWeight:700,fontSize:15,marginBottom:16,color:"#374151"}}>🧮 Calculadora de Meta</div>
          ${[{k:"total",l:"Valor total que precisa"},{k:"saved",l:"Já tenho guardado"}].map(({k,l})=>html`<div key=${k} style=${{marginBottom:12}}>
            <label style=${C.lbl}>${l}</label>
            <${CurrencyInput} value=${calc[k]} onChange=${v=>setCalc({...calc,[k]:v})} style=${C.inp}/>
          </div>`)}
          <div style=${{marginBottom:16}}>
            <label style=${C.lbl}>Em quantos meses quer juntar?</label>
            <input type="number" inputMode="numeric" placeholder="Ex: 12" value=${calc.months||""} style=${C.inp} onChange=${e=>setCalc({...calc,months:e.target.value})}/>
          </div>
          ${calcPMes!==null&&html`<div style=${{background:"#D1FAE5",borderRadius:14,padding:18,textAlign:"center"}}>
            <div style=${{fontSize:13,color:"#065F46",fontWeight:600}}>Você precisa guardar por mês:</div>
            <div style=${{fontSize:38,fontWeight:900,color:"#16a34a",letterSpacing:"-1.5px",marginTop:4}}>${fmt(calcPMes)}</div>
          </div>`}
        </div>
      </div>`}

      ${tab==="dicas"&&html`<div style=${{padding:"0 16px"}}>
        ${TIPS.map(({icon,title,text})=>html`<div key=${title} style=${C.card}>
          <div style=${{display:"flex",gap:14,alignItems:"flex-start"}}>
            <div style=${{fontSize:28,flexShrink:0,lineHeight:1}}>${icon}</div>
            <div><div style=${{fontWeight:700,fontSize:15,color:"#111827",marginBottom:6}}>${title}</div><div style=${{fontSize:14,color:"#6B7280",lineHeight:1.6}}>${text}</div></div>
          </div>
        </div>`)}
        <div style=${{...C.card,textAlign:"center",background:"#D1FAE5",marginBottom:24}}>
          <div style=${{fontSize:40}}>💪</div>
          <div style=${{fontWeight:800,fontSize:18,color:"#065F46",marginTop:10}}>Você é capaz!</div>
          <div style=${{fontSize:14,color:"#047857",marginTop:6,lineHeight:1.6}}>Cada real guardado é um passo rumo aos seus sonhos. Continue firme!</div>
        </div>
      </div>`}
    </div>

    <!-- NAV BOTTOM -->
    <div style=${{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #E5E7EB",display:"flex",zIndex:50}}>
      ${[{id:"home",icon:"💸",label:"Lançar"},{id:"painel",icon:"📊",label:"Painel"},{id:"historico",icon:"📅",label:"Histórico"},{id:"metas",icon:"🎯",label:"Metas"},{id:"dicas",icon:"💡",label:"Dicas"}].map(t=>html`<button key=${t.id} onClick=${()=>setTab(t.id)} style=${{flex:1,border:"none",background:"transparent",padding:"12px 0 10px",cursor:"pointer",color:tab===t.id?"#15803d":"#9CA3AF",borderTop:tab===t.id?"3px solid #15803d":"3px solid transparent",fontFamily:"inherit"}}>
        <div style=${{fontSize:22}}>${t.icon}</div>
        <div style=${{fontSize:10,fontWeight:700,marginTop:2}}>${t.label}</div>
      </button>`)}
    </div>

    <!-- MODAL SETUP -->
    ${modal==="setup"&&html`<${Overlay} onClose=${()=>setModal(null)}>
      <div style=${{textAlign:"center",marginBottom:24}}><div style=${{fontSize:52}}>💰</div><div style=${{fontWeight:800,fontSize:22,marginTop:10}}>Meu Controle Financeiro</div><div style=${{color:"#6B7280",fontSize:14,marginTop:6}}>Vamos começar!</div></div>
      <label style=${C.lbl}>👤 Seu nome</label>
      <input ref=${firstRef} style=${{...C.inp,marginBottom:16}} placeholder="Ex: João da Silva" value=${form.userName||""} onChange=${e=>setForm({...form,userName:e.target.value})}/>
      <label style=${C.lbl}>💼 Renda mensal <span style=${{fontWeight:400,color:"#9CA3AF"}}>(opcional)</span></label>
      <${CurrencyInput} value=${form.monthlyIncome||""} onChange=${v=>setForm({...form,monthlyIncome:v})} style=${{...C.inp,marginBottom:24}}/>
      <button onClick=${saveSetup} style=${{...C.btn("#15803d"),opacity:form.userName?.trim()?1:0.45,marginBottom:12}}>✅ Salvar e Começar</button>
      <div style=${{display:"flex",gap:8}}>
        <button onClick=${exportData} style=${{...C.btn("#F3F4F6","#374151"),fontSize:14,padding:"13px"}}>📤 Exportar</button>
        <button onClick=${()=>importRef.current?.click()} style=${{...C.btn("#F3F4F6","#374151"),fontSize:14,padding:"13px"}}>📥 Importar</button>
      </div>
      <input ref=${importRef} type="file" accept=".json" style=${{display:"none"}} onChange=${importData}/>
      ${data.userName&&html`<button onClick=${()=>setModal(null)} style=${{...C.btn("white","#6B7280"),border:"2px solid #E5E7EB",marginTop:8}}>Cancelar</button>`}
    </${Overlay}>`}

    <!-- MODAL ADD -->
    ${modal==="add"&&html`<${Overlay} onClose=${()=>setModal(null)}>
      <div style=${{display:"flex",gap:6,marginBottom:20,background:"#F3F4F6",borderRadius:14,padding:4}}>
        <button onClick=${()=>setForm({...form,type:"entrada",category:INCOME_TYPES[0]})} style=${{flex:1,border:"none",borderRadius:10,padding:13,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit",background:form.type==="entrada"?"#16a34a":"transparent",color:form.type==="entrada"?"white":"#6B7280"}}>⬆️ Entrada</button>
        <button onClick=${()=>setForm({...form,type:"gasto",category:EXPENSE_CATS[0]})} style=${{flex:1,border:"none",borderRadius:10,padding:13,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit",background:form.type==="gasto"?"#DC2626":"transparent",color:form.type==="gasto"?"white":"#6B7280"}}>⬇️ Gasto</button>
      </div>
      <label style=${C.lbl}>📝 O que foi?</label>
      <input ref=${firstRef} style=${{...C.inp,marginBottom:16}} placeholder=${form.type==="entrada"?"Ex: Salário de julho":"Ex: Supermercado"} value=${form.description||""} onChange=${e=>setForm({...form,description:e.target.value})}/>
      <label style=${C.lbl}>${form.type==="entrada"?"🏷️ Tipo":"🏷️ Categoria"}</label>
      <select style=${{...C.inp,marginBottom:16}} value=${form.category||""} onChange=${e=>setForm({...form,category:e.target.value})}>
        ${(form.type==="entrada"?INCOME_TYPES:EXPENSE_CATS).map(c=>html`<option key=${c} value=${c}>${c}</option>`)}
      </select>
      <div style=${{display:"flex",gap:12,marginBottom:16}}>
        <div style=${{flex:1}}><label style=${C.lbl}>📅 Data</label><input type="date" style=${C.inp} value=${form.date||""} onChange=${e=>setForm({...form,date:e.target.value})}/></div>
        <div style=${{flex:1}}><label style=${C.lbl}>💵 Valor</label><${CurrencyInput} value=${form.value||""} onChange=${v=>setForm({...form,value:v})} style=${C.inp} large=${true}/></div>
      </div>
      <label style=${{...C.lbl,display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:20,fontWeight:500}}>
        <input type="checkbox" checked=${!!form.recurring} onChange=${e=>setForm({...form,recurring:e.target.checked})} style=${{width:20,height:20,accentColor:"#15803d"}}/>
        <span>🔁 Repetir todo mês (recorrente)</span>
      </label>
      <button onClick=${saveTransaction} style=${{...C.btn(form.type==="entrada"?"#16a34a":"#DC2626"),opacity:form.description?.trim()&&form.value?1:0.45}}>✅ Salvar</button>
      <button onClick=${()=>setModal(null)} style=${{...C.btn("white","#6B7280"),border:"2px solid #E5E7EB",marginTop:8}}>Cancelar</button>
    </${Overlay}>`}

    <!-- MODAL GOAL -->
    ${modal==="goal"&&html`<${Overlay} onClose=${()=>{setModal(null);setEditId(null);}}>
      <div style=${{fontWeight:800,fontSize:20,marginBottom:20}}>🎯 ${editId?"Editar":"Nova"} Meta</div>
      <label style=${C.lbl}>🌟 Meu sonho / objetivo</label>
      <input ref=${firstRef} style=${{...C.inp,marginBottom:16}} placeholder="Ex: Viagem para o litoral" value=${form.dream||""} onChange=${e=>setForm({...form,dream:e.target.value})}/>
      <label style=${C.lbl}>🎯 Valor total necessário</label>
      <${CurrencyInput} value=${form.targetValue||""} onChange=${v=>setForm({...form,targetValue:v})} style=${{...C.inp,marginBottom:16}}/>
      <label style=${C.lbl}>💰 Já tenho guardado</label>
      <${CurrencyInput} value=${form.savedValue||""} onChange=${v=>setForm({...form,savedValue:v})} style=${{...C.inp,marginBottom:16}}/>
      <label style=${C.lbl}>📅 Prazo</label>
      <input style=${{...C.inp,marginBottom:24}} placeholder="Ex: Dezembro/2026" value=${form.deadline||""} onChange=${e=>setForm({...form,deadline:e.target.value})}/>
      <button onClick=${saveGoal} style=${{...C.btn("#D97706"),opacity:form.dream?.trim()&&form.targetValue?1:0.45}}>✅ Salvar Meta</button>
      <button onClick=${()=>{setModal(null);setEditId(null);}} style=${{...C.btn("white","#6B7280"),border:"2px solid #E5E7EB",marginTop:8}}>Cancelar</button>
    </${Overlay}>`}

    <!-- CONFIRM DELETE -->
    ${delId&&html`<div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style=${{background:"white",borderRadius:20,padding:28,width:"100%",maxWidth:340,textAlign:"center"}}>
        <div style=${{fontSize:44,marginBottom:12}}>🗑️</div>
        <div style=${{fontWeight:800,fontSize:18,marginBottom:8}}>Excluir lançamento?</div>
        <div style=${{color:"#6B7280",fontSize:14,marginBottom:24,lineHeight:1.5}}>Essa ação não pode ser desfeita.</div>
        <div style=${{display:"flex",gap:10}}>
          <button onClick=${()=>setDelId(null)} style=${{...C.row("white","#374151"),border:"2px solid #E5E7EB"}}>Cancelar</button>
          <button onClick=${()=>deleteTx(delId)} style=${C.row("#DC2626")}>Excluir</button>
        </div>
      </div>
    </div>`}
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
</script>
</body>
</html>
