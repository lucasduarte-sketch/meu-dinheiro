<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Meu Dinheiro 💰</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#15803d"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Meu Dinheiro"/>
  <style>
    :root{--bg:#F0FDF4;--surface:#fff;--surface2:#F8FAFC;--text:#111827;--text2:#6B7280;--text3:#9CA3AF;--border:#E5E7EB;--border2:#F3F4F6;--shadow:0 4px 24px rgba(0,0,0,0.08);--shadow-sm:0 2px 8px rgba(0,0,0,0.05);}
    .dark{--bg:#0B1120;--surface:#1A2332;--surface2:#243044;--text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;--border:#2D3F55;--border2:#1A2332;--shadow:0 4px 24px rgba(0,0,0,0.35);--shadow-sm:0 2px 8px rgba(0,0,0,0.25);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);font-family:system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;color:var(--text);transition:background .3s,color .3s;}
    #root{min-height:100vh;} ::-webkit-scrollbar{display:none;} select,input,textarea{font-family:inherit;color:var(--text);}
    button{transition:opacity .15s,transform .1s;} button:active{transform:scale(0.97);opacity:.85;}
    input:focus,select:focus{border-color:#15803d!important;box-shadow:0 0 0 3px rgba(21,128,61,.12)!important;outline:none;}
    #splash{position:fixed;inset:0;background:linear-gradient(145deg,#14532d,#166534);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px;transition:opacity .5s;}
    .spin{width:38px;height:38px;border:3px solid rgba(255,255,255,.25);border-top-color:white;border-radius:50%;animation:sp .8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg)}}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .pill{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;transition:all .2s;}
  </style>
</head>
<body>
<div id="splash">
  <div style="font-size:64px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))">💰</div>
  <div class="spin"></div>
  <p style="color:white;font-weight:800;font-size:18px;letter-spacing:.5px">Meu Dinheiro</p>
</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm/dist/htm.umd.js"></script>
<script>
const {useState,useEffect,useCallback,useRef}=React;
const html=htm.bind(React.createElement);
const THIS_YEAR=new Date().getFullYear();
const MAX_YEAR=2032;

(function(){try{const c=document.createElement('canvas');c.width=c.height=192;const x=c.getContext('2d'),r=44;x.beginPath();x.moveTo(r,0);x.lineTo(192-r,0);x.arcTo(192,0,192,r,r);x.lineTo(192,192-r);x.arcTo(192,192,192-r,192,r);x.lineTo(r,192);x.arcTo(0,192,0,192-r,r);x.lineTo(0,r);x.arcTo(0,0,r,0,r);x.fillStyle='#15803d';x.fill();x.fillStyle='white';x.font='bold 76px Arial';x.textAlign='center';x.textBaseline='middle';x.fillText('R$',96,96);const lnk=document.createElement('link');lnk.rel='apple-touch-icon';lnk.href=c.toDataURL('image/png');document.head.appendChild(lnk);}catch(e){}})();
const hideSplash=()=>{const s=document.getElementById('splash');if(s){s.style.opacity='0';setTimeout(()=>s.remove(),500);}};

const MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const EXPENSE_CATS=["Alimentação","Moradia","Transporte","Saúde","Educação","Lazer","Cartão de Crédito","Financiamentos","Empréstimos","Outros"];
const INCOME_TYPES=["Salário","13º Salário","Hora Extra","Férias","FGTS/Rescisão","Pensão","Renda Extra","Freelance","Aluguel Recebido","Outros"];
const EMOJIS={"Alimentação":"🍽️","Moradia":"🏠","Transporte":"🚗","Saúde":"❤️","Educação":"📚","Lazer":"🎮","Cartão de Crédito":"💳","Financiamentos":"🏦","Empréstimos":"💸","Outros":"📦","Salário":"👔","13º Salário":"🎁","Hora Extra":"⏰","Férias":"🏖️","FGTS/Rescisão":"📋","Pensão":"👨‍👩‍👧","Renda Extra":"💡","Freelance":"💻","Aluguel Recebido":"🏘️"};
const CAT_COLORS={"Alimentação":"#F59E0B","Moradia":"#3B82F6","Transporte":"#8B5CF6","Saúde":"#EF4444","Educação":"#06B6D4","Lazer":"#10B981","Cartão de Crédito":"#F97316","Financiamentos":"#6366F1","Empréstimos":"#EC4899","Outros":"#9CA3AF"};
const DEFAULT_ACCOUNTS=[{id:"wallet",name:"Carteira",icon:"👛",color:"#F59E0B",initialBalance:0},{id:"bank",name:"Banco",icon:"🏦",color:"#3B82F6",initialBalance:0},{id:"savings",name:"Poupança",icon:"🐷",color:"#10B981",initialBalance:0}];
const TIPS=[
  {icon:"🌟",title:"Regra do 50-30-20",text:"Gaste no máximo 50% com necessidades, 30% com desejos e guarde pelo menos 20%."},
  {icon:"🚫",title:"Cuidado com o cartão",text:"Só gaste o que você já tem no bolso. Pague sempre o valor total da fatura."},
  {icon:"🏦",title:"Reserva de emergência",text:"Tente juntar pelo menos 3 meses dos seus gastos mensais para imprevistos."},
  {icon:"🛒",title:"Liste antes de comprar",text:"Comprar sem lista aumenta os gastos em até 40%!"},
  {icon:"📱",title:"Compra por impulso",text:"Se quiser algo não planejado, espere 24h. A vontade geralmente passa."},
  {icon:"💸",title:"Evite juros caros",text:"Cheque especial e rotativo do cartão têm juros altíssimos. Fuja deles."},
  {icon:"📊",title:"Anote tudo",text:"R$10 por dia = R$300 por mês = R$3.600 por ano. Cada real conta!"},
  {icon:"🎯",title:"Tenha um objetivo",text:"Uma meta clara ajuda a resistir à tentação de gastar."},
  {icon:"🔄",title:"Revise todo mês",text:"15 minutos no fim do mês para revisar seus gastos fazem toda a diferença."},
];

const fmt=(v)=>(Number(v)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const KEY="meu-financeiro-v8";
const centsToNum=(c)=>parseInt(c||"0")/100;
const numToCents=(n)=>String(Math.round((Number(n)||0)*100));
const migrateData=(d)=>({
  ...d,
  transactions:(d.transactions||[]).map(t=>({...t,year:t.year||(t.date?parseInt(t.date.split('-')[0]):THIS_YEAR),accountId:t.accountId||"bank",notes:t.notes||""})),
  goals:d.goals||[],budgets:d.budgets||{},
  accounts:(d.accounts||DEFAULT_ACCOUNTS).map(a=>({...a,initialBalance:a.initialBalance||0})),
});

const C={
  card:{background:"var(--surface)",borderRadius:22,padding:22,marginBottom:16,boxShadow:"var(--shadow)"},
  inp:{border:"2px solid var(--border)",borderRadius:14,padding:"14px 16px",fontSize:16,width:"100%",boxSizing:"border-box",fontFamily:"inherit",background:"var(--surface)",color:"var(--text)",transition:"border-color .2s"},
  lbl:{fontSize:12,fontWeight:700,color:"var(--text2)",marginBottom:7,display:"block",letterSpacing:.4,textTransform:"uppercase"},
  btn:(bg,fg="#fff")=>({background:bg,color:fg,border:"none",borderRadius:14,padding:"17px 20px",fontWeight:800,fontSize:16,cursor:"pointer",display:"block",width:"100%",textAlign:"center",fontFamily:"inherit"}),
  row:(bg,fg="#fff")=>({background:bg,color:fg,border:"none",borderRadius:14,padding:"17px 0",fontWeight:800,fontSize:16,cursor:"pointer",flex:1,textAlign:"center",fontFamily:"inherit"}),
};

// ── Componentes FORA do App (evita remount a cada render) ──

function Toast({message,type}){
  return html`<div style=${{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",background:type==="error"?"#DC2626":"#15803d",color:"white",padding:"13px 22px",borderRadius:16,fontWeight:700,fontSize:14,zIndex:500,boxShadow:"0 4px 20px rgba(0,0,0,.3)",whiteSpace:"nowrap",animation:"slideUp .25s ease",maxWidth:"90vw",textAlign:"center"}}>
    ${message}
  </div>`;
}

function Overlay({children,onClose}){
  return html`<div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:100,display:"flex",alignItems:"flex-end",backdropFilter:"blur(4px)"}} onClick=${e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style=${{background:"var(--surface)",borderRadius:"24px 24px 0 0",width:"100%",maxHeight:"92vh",overflowY:"auto",padding:"8px 0 0"}}>
      <div style=${{width:40,height:4,background:"var(--border)",borderRadius:2,margin:"0 auto 20px"}}/>
      <div style=${{padding:"0 24px 52px"}}>${children}</div>
    </div>
  </div>`;
}

function CurrencyInput({value,onChange,style,large}){
  const display=()=>{const c=parseInt(value||"0");if(!c)return"";return(c/100).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});};
  return html`<input type="text" inputMode="numeric" value=${display()} onChange=${e=>onChange(e.target.value.replace(/\D/g,""))} placeholder="R$ 0,00" style=${{...style,fontWeight:large?800:600,fontSize:large?24:16,letterSpacing:large?-1:0}}/>`;
}

function DonutChart({catTotals,total}){
  if(!total)return null;
  const cats=EXPENSE_CATS.filter(c=>catTotals[c]>0);
  if(!cats.length)return null;
  const R=60,CX=82,CY=82,CIRC=2*Math.PI*R;
  let off=CIRC/4;
  const segs=cats.map(c=>{const dash=(catTotals[c]/total)*CIRC;const s={c,color:CAT_COLORS[c],dash,offset:CIRC-off};off+=dash;return s;});
  return html`<div style=${{marginBottom:20}}>
    <svg viewBox="0 0 164 164" style=${{width:"100%",maxWidth:180,display:"block",margin:"0 auto"}}>
      <circle cx=${CX} cy=${CY} r=${R} fill="none" stroke="var(--border2)" stroke-width="28"/>
      ${segs.map(s=>html`<circle key=${s.c} cx=${CX} cy=${CY} r=${R} fill="none" stroke=${s.color} stroke-width="26" stroke-dasharray="${s.dash} ${CIRC}" stroke-dashoffset="${s.offset}"/>`)}
      <text x=${CX} y=${CY-7} text-anchor="middle" style=${{fontSize:"10px",fill:"var(--text3)",fontFamily:"system-ui",fontWeight:"600"}}>Total</text>
      <text x=${CX} y=${CY+11} text-anchor="middle" style=${{fontSize:"13px",fontWeight:"800",fill:"var(--text)",fontFamily:"system-ui"}}>${fmt(total)}</text>
    </svg>
    <div style=${{display:"flex",flexWrap:"wrap",gap:"6px 14px",marginTop:12,justifyContent:"center"}}>
      ${cats.map(c=>html`<div key=${c} style=${{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--text2)"}}>
        <div style=${{width:8,height:8,borderRadius:2,background:CAT_COLORS[c],flexShrink:0}}/>
        <span style=${{fontWeight:600}}>${c} <span style=${{color:"var(--text3)"}}>${Math.round(catTotals[c]/total*100)}%</span></span>
      </div>`)}
    </div>
  </div>`;
}

function MonthlyBarChart({hist,onMonthClick}){
  const maxVal=Math.max(...hist.map(m=>Math.max(m.entradas,m.gastos)),1);
  const H=90;
  return html`<div>
    <div style=${{display:"flex",alignItems:"flex-end",height:H+28,gap:1}}>
      ${hist.map(({month:m,entradas:e,gastos:g,hasTx})=>html`<div key=${m} onClick=${()=>hasTx&&onMonthClick(m)} style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:hasTx?"pointer":"default"}}>
        <div style=${{display:"flex",alignItems:"flex-end",height:H,gap:1,width:"100%",justifyContent:"center"}}>
          <div style=${{width:"44%",height:Math.max((e/maxVal)*H,hasTx?3:0)+"px",background:"#16a34a",borderRadius:"4px 4px 0 0",opacity:hasTx?.9:.15}}/>
          <div style=${{width:"44%",height:Math.max((g/maxVal)*H,hasTx?3:0)+"px",background:"#DC2626",borderRadius:"4px 4px 0 0",opacity:hasTx?.9:.15}}/>
        </div>
        <div style=${{fontSize:9,color:"var(--text3)",fontWeight:700,marginTop:5,textAlign:"center"}}>${m.slice(0,1)}</div>
      </div>`)}
    </div>
    <div style=${{display:"flex",gap:16,justifyContent:"center",marginTop:14}}>
      ${[{c:"#16a34a",l:"Entradas"},{c:"#DC2626",l:"Gastos"}].map(({c,l})=>html`<div key=${l} style=${{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--text2)",fontWeight:600}}>
        <div style=${{width:10,height:10,borderRadius:3,background:c}}/>${l}
      </div>`)}
    </div>
  </div>`;
}

function HealthScore({income,gastos,saldo,necessidades,desejos,dividas,goals,budgets}){
  if(!income)return null;
  const ratio=gastos/income;
  let score=100;
  if(ratio>1)score-=50;else if(ratio>0.9)score-=35;else if(ratio>0.7)score-=20;else if(ratio>0.5)score-=5;
  if(necessidades/income>0.5)score-=15;
  if(desejos/income>0.3)score-=10;
  if(dividas/income>0.2)score-=10;
  if((goals||[]).length===0)score-=5;
  if(!Object.values(budgets||{}).some(v=>v>0))score-=5;
  score=Math.max(0,Math.min(100,score));
  const level=score>=80?{label:"Ótima",color:"#15803d",bg:"#D1FAE5",emoji:"🟢"}:score>=60?{label:"Boa",color:"#16a34a",bg:"#DCFCE7",emoji:"💚"}:score>=40?{label:"Regular",color:"#D97706",bg:"#FEF3C7",emoji:"🟡"}:score>=20?{label:"Ruim",color:"#DC2626",bg:"#FEE2E2",emoji:"🔴"}:{label:"Crítica",color:"#7F1D1D",bg:"#FEE2E2",emoji:"🚨"};
  return html`<div style=${{...C.card,background:level.bg,border:"none",padding:20,marginBottom:16}}>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <div><div style=${{fontSize:12,fontWeight:700,color:level.color,letterSpacing:.5,textTransform:"uppercase"}}>Saúde Financeira</div><div style=${{fontSize:28,fontWeight:900,color:level.color,marginTop:2}}>${level.emoji} ${level.label}</div></div>
      <div style=${{textAlign:"center"}}><div style=${{fontSize:36,fontWeight:900,color:level.color,lineHeight:1}}>${score}</div><div style=${{fontSize:11,color:level.color,fontWeight:600,opacity:.8}}>/ 100</div></div>
    </div>
    <div style=${{background:"rgba(255,255,255,0.5)",borderRadius:8,height:10,overflow:"hidden",marginBottom:12}}><div style=${{height:"100%",background:level.color,width:score+"%",borderRadius:8}}/></div>
    <div style=${{display:"flex",gap:10}}>
      <div style=${{flex:1,background:"rgba(255,255,255,0.6)",borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
        <div style=${{fontSize:11,color:level.color,fontWeight:600}}>Renda usada</div>
        <div style=${{fontSize:18,fontWeight:800,color:ratio>1?"#DC2626":level.color,marginTop:2}}>${Math.round(ratio*100)}%</div>
      </div>
      <div style=${{flex:1,background:"rgba(255,255,255,0.6)",borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
        <div style=${{fontSize:11,color:level.color,fontWeight:600}}>Sobrou</div>
        <div style=${{fontSize:18,fontWeight:800,color:saldo>=0?"#15803d":"#DC2626",marginTop:2}}>${fmt(saldo)}</div>
      </div>
    </div>
  </div>`;
}

// ── APP ──
function App(){
  const [tab,setTab]=useState("home");
  const [data,setData]=useState({userName:"",monthlyIncome:"",transactions:[],goals:[],budgets:{},accounts:DEFAULT_ACCOUNTS});
  const [year,setYear]=useState(THIS_YEAR);
  const [month,setMonth]=useState(MONTHS[new Date().getMonth()]);
  const [dark,setDark]=useState(false);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [editId,setEditId]=useState(null);
  const [delId,setDelId]=useState(null);
  const [search,setSearch]=useState("");
  const [filterCat,setFilterCat]=useState("");
  const [showSearch,setShowSearch]=useState(false);
  const [calc,setCalc]=useState({total:"",saved:"",months:""});
  const [budgetForm,setBudgetForm]=useState({});
  const [toast,setToast]=useState(null);
  const firstRef=useRef(null);
  const importRef=useRef(null);

  // FIX 1: Limpa busca ao trocar mês ou aba
  useEffect(()=>{setSearch("");setFilterCat("");setShowSearch(false);},[month,tab]);
  useEffect(()=>{if(modal&&firstRef.current){const t=setTimeout(()=>firstRef.current?.focus(),60);return()=>clearTimeout(t);}},[modal]);
  useEffect(()=>{
    try{
      const raw=localStorage.getItem(KEY)||localStorage.getItem("meu-financeiro-v7")||localStorage.getItem("meu-financeiro-v6")||localStorage.getItem("meu-financeiro-v5")||localStorage.getItem("meu-financeiro-v3");
      if(raw){const d=migrateData(JSON.parse(raw));setData(d);if(!d.userName)setModal("setup");}
      else setModal("setup");
      const dk=localStorage.getItem("dark-mode")==="true";
      setDark(dk);if(dk)document.documentElement.classList.add("dark");
    }catch{setModal("setup");}
    hideSplash();
  },[]);

  // FIX 4: Toast no lugar de alert()
  const showToast=useCallback((msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);},[]);
  const persist=useCallback((d)=>{setData(d);try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}},[]);
  const toggleDark=()=>{const nd=!dark;setDark(nd);localStorage.setItem("dark-mode",nd);document.documentElement.classList.toggle("dark",nd);};

  const monthTx=data.transactions.filter(t=>t.month===month&&t.year===year);
  const entradas=monthTx.filter(t=>t.type==="entrada").reduce((s,t)=>s+t.value,0);
  const gastos=monthTx.filter(t=>t.type==="gasto").reduce((s,t)=>s+t.value,0);
  const saldo=entradas-gastos;
  const income=Number(data.monthlyIncome)||0;
  const catTotals=Object.fromEntries(EXPENSE_CATS.map(c=>[c,monthTx.filter(t=>t.type==="gasto"&&t.category===c).reduce((s,t)=>s+t.value,0)]));
  const hist=MONTHS.map(m=>{const tx=data.transactions.filter(t=>t.month===m&&t.year===year);const e=tx.filter(t=>t.type==="entrada").reduce((s,t)=>s+t.value,0);const g=tx.filter(t=>t.type==="gasto").reduce((s,t)=>s+t.value,0);return{month:m,entradas:e,gastos:g,saldo:e-g,hasTx:tx.length>0};});
  const yearEntradas=hist.reduce((s,m)=>s+m.entradas,0);
  const yearGastos=hist.reduce((s,m)=>s+m.gastos,0);
  const yearSaldo=yearEntradas-yearGastos;
  const allTimeSaldo=data.transactions.reduce((s,t)=>s+(t.type==="entrada"?t.value:-t.value),0);
  const yearsWithData=[...new Set(data.transactions.map(t=>t.year||THIS_YEAR))].sort();
  const minYear=Math.min(THIS_YEAR,...yearsWithData);
  const necessidades=["Alimentação","Moradia","Saúde","Transporte"].reduce((s,c)=>s+(catTotals[c]||0),0);
  const desejos=["Lazer","Educação","Outros"].reduce((s,c)=>s+(catTotals[c]||0),0);
  const dividas=["Cartão de Crédito","Financiamentos","Empréstimos"].reduce((s,c)=>s+(catTotals[c]||0),0);
  const accounts=data.accounts||DEFAULT_ACCOUNTS;

  // FIX 5: Saldo por conta com initialBalance
  const accountBalance=(accId)=>{
    const acc=accounts.find(a=>a.id===accId);
    const init=Number(acc?.initialBalance)||0;
    return init+data.transactions.filter(t=>t.accountId===accId).reduce((s,t)=>s+(t.type==="entrada"?t.value:-t.value),0);
  };

  const budgetAlerts=EXPENSE_CATS.filter(c=>{const b=data.budgets?.[c];return b&&catTotals[c]/b>=0.8;}).map(c=>({cat:c,val:catTotals[c],budget:data.budgets[c],pct:Math.round(catTotals[c]/data.budgets[c]*100),over:catTotals[c]>data.budgets[c]}));
  const recurringAll=data.transactions.filter(t=>t.recurring);
  const showRecurring=recurringAll.length>0&&monthTx.filter(t=>t.recurring).length===0;
  const addRecurring=()=>{const seen=new Set();const toAdd=recurringAll.filter(t=>{const k=`${t.description}|${t.category}|${t.type}`;if(seen.has(k))return false;seen.add(k);return true;}).map(t=>({...t,id:uid(),month,year,date:new Date().toISOString().split("T")[0]}));persist({...data,transactions:[...data.transactions,...toAdd]});showToast(`🔁 ${toAdd.length} lançamentos adicionados!`);};

  const exportData=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`meu-dinheiro-backup-${THIS_YEAR}.json`;a.click();URL.revokeObjectURL(url);showToast("📤 Backup exportado com sucesso!");};
  const importData=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=migrateData(JSON.parse(ev.target.result));if(d.transactions&&d.goals){persist(d);showToast("✅ Dados importados com sucesso!");}else showToast("❌ Arquivo inválido!","error");}catch{showToast("❌ Arquivo inválido!","error");}};reader.readAsText(file);e.target.value="";};

  const shareMonth=async()=>{
    const text=`💰 *${month}/${year} — Meu Dinheiro*\n\n✅ Recebi: *${fmt(entradas)}*\n❌ Gastei: *${fmt(gastos)}*\n💵 Saldo: *${fmt(saldo)}*\n\n${saldo>=0?"😊 Fiquei no positivo!":"😬 Gastei mais do que recebi."}\n\nFeito com o app Meu Dinheiro 💚`;
    if(navigator.share){try{await navigator.share({title:"Meu Dinheiro",text});}catch(e){}}

        <${CurrencyInput} value=${budgetForm[cat]||""} onChange=${v=>setBudgetForm({...budgetForm,[cat]:v})} style=${C.inp} placeholder="Sem limite"/>
      </div>`)}
      <button onClick=${saveBudgets} style=${{...C.btn("#15803d"),marginTop:8,borderRadius:16}}>✅ Salvar Limites</button>
      <button onClick=${()=>setModal(null)} style=${{...C.btn("transparent","var(--text3)"),border:"2px solid var(--border)",marginTop:8}}>Cancelar</button>
    </${Overlay}>`}

    <!-- CONFIRM DELETE -->
    ${delId&&html`<div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24,backdropFilter:"blur(4px)"}}>
      <div style=${{background:"var(--surface)",borderRadius:24,padding:32,width:"100%",maxWidth:340,textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style=${{fontSize:48,marginBottom:14}}>🗑️</div>
        <div style=${{fontWeight:800,fontSize:19,marginBottom:8,color:"var(--text)"}}>Excluir lançamento?</div>
        <div style=${{color:"var(--text3)",fontSize:14,marginBottom:28,lineHeight:1.6}}>Essa ação não pode ser desfeita.</div>
        <div style=${{display:"flex",gap:10}}>
          <button onClick=${()=>setDelId(null)} style=${{...C.row("var(--surface2)","var(--text2)"),borderRadius:14}}>Cancelar</button>
          <button onClick=${()=>deleteTx(delId)} style=${{...C.row("#DC2626"),borderRadius:14}}>Excluir</button>
        </div>
      </div>
    </div>`}

    <!-- FIX 4: Toast (substitui alert()) -->
    ${toast&&html`<${Toast} message=${toast.msg} type=${toast.type}/>`}
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
</script>
</body>
</html>
